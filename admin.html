<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virexa Studio - Portal Kreator</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel (Untuk kompilasi JSX di browser) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #050000; }
        ::-webkit-scrollbar-thumb { background: #4a0404; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #dc2626; }
        body { background-color: #050000; color: #f3f4f6; }
        .glass-sidebar { background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(20px); border-right: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ============================================================
        // 1. PENGATURAN BACKEND & DATABASE (LIHAT DI SINI)
        // ============================================================
        
        // GANTI link di bawah ini dengan URL dari VERCEL Anda!
        // Contoh: "https://virexa-backend.vercel.app"
        const BACKEND_URL = "https://virexa-backend.vercel.app"; 

        const SUPABASE_URL = 'https://pgefqhpomzjbqbqobkta.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_YO3yI5L3PSXl2X9VXhwRcQ_OID1tZdo';
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ============================================================
        // 2. LOGIKA LAYANAN AI (MENGGUNAKAN BACKEND)
        // ============================================================
        const AI = {
            generateText: async (prompt, systemInstruction = "", signal) => {
                const res = await fetch(`${BACKEND_URL}/api/generate-text`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt, systemInstruction }), signal
                });
                const data = await res.json();
                if (!data.success) throw new Error(data.error);
                return data.text;
            },
            
            generateImage: async (prompt, ratio = "1:1", signal) => {
                const res = await fetch(`${BACKEND_URL}/api/generate-image`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt, ratio }), signal
                });
                const data = await res.json();
                if (!data.success) throw new Error(data.error);
                return data.image;
            },
            
            analyzeImage: async (base64Image, prompt, signal) => {
                const res = await fetch(`${BACKEND_URL}/api/generate-text`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt, base64Image }), signal
                });
                const data = await res.json();
                if (!data.success) throw new Error(data.error);
                return data.text;
            },

            editImage: async (base64Images, prompt, ratio = "1:1", signal) => {
                const res = await fetch(`${BACKEND_URL}/api/edit-image`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt, base64Images, ratio }), signal
                });
                const data = await res.json();
                if (!data.success) throw new Error(data.error);
                return data.image;
            }
        };

        // --- UI HELPERS ---
        const Toast = ({ message, type, onClose }) => {
            useEffect(() => { const timer = setTimeout(onClose, 3000); return () => clearTimeout(timer); }, [onClose]);
            const bg = type === 'error' ? 'bg-red-900 border-red-500' : 'bg-green-900 border-green-500';
            return (
                <div className={`fixed bottom-4 right-4 flex items-center gap-2 px-4 py-3 rounded-lg border backdrop-blur-md shadow-lg z-50 animate-bounce ${bg} text-white text-sm`}>
                    <i className="ph-fill ph-info"></i> {message}
                </div>
            );
        };

        // ============================================================
        // 3. KOMPONEN UTAMA APLIKASI
        // ============================================================
        function App() {
            const [uiUser, setUiUser] = useState(null);
            const [activeTab, setActiveTab] = useState('home');
            const [toast, setToast] = useState(null);
            const [isInitializing, setIsInitializing] = useState(true);

            useEffect(() => {
                supabase.auth.getSession().then(({ data: { session } }) => {
                    setUiUser(session?.user ?? null);
                    setIsInitializing(false);
                });
                supabase.auth.onAuthStateChange((_event, session) => {
                    setUiUser(session?.user ?? null);
                });
            }, []);

            const showToast = (message, type = 'success') => setToast({ message, type });

            if (isInitializing) return (
                <div className="h-screen flex items-center justify-center bg-black">
                    <i className="ph ph-spinner-gap animate-spin text-4xl text-red-600"></i>
                </div>
            );

            if (!uiUser) return <AuthScreen showToast={showToast} supabase={supabase} />;

            return (
                <div className="flex h-screen overflow-hidden">
                    {/* Sidebar */}
                    <aside className="w-64 glass-sidebar flex flex-col p-6 space-y-8">
                        <div className="flex items-center gap-2">
                            <i className="ph-fill ph-sparkle text-3xl text-red-600"></i>
                            <h1 className="text-xl font-black tracking-tighter">VIREXA</h1>
                        </div>
                        <nav className="flex-1 space-y-2">
                            <button onClick={() => setActiveTab('home')} className={`w-full text-left px-4 py-3 rounded-xl transition ${activeTab === 'home' ? 'bg-red-600/20 text-white' : 'text-gray-400 hover:bg-white/5'}`}>Beranda</button>
                            <button onClick={() => setActiveTab('image-gen')} className={`w-full text-left px-4 py-3 rounded-xl transition ${activeTab === 'image-gen' ? 'bg-red-600/20 text-white' : 'text-gray-400 hover:bg-white/5'}`}>Affiliate Studio</button>
                        </nav>
                        <button onClick={() => supabase.auth.signOut()} className="text-gray-500 text-xs hover:text-white transition">Keluar Akun</button>
                    </aside>

                    {/* Content */}
                    <main className="flex-1 overflow-y-auto p-10">
                        {activeTab === 'home' && (
                            <div className="space-y-4">
                                <h2 className="text-3xl font-bold">Halo, Kreator!</h2>
                                <p className="text-gray-400">Selamat datang kembali di Virexa Studio. Siap berkarya hari ini?</p>
                            </div>
                        )}
                        {activeTab === 'image-gen' && <ImageGenView showToast={showToast} />}
                    </main>

                    {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
                </div>
            );
        }

        function ImageGenView({ showToast }) {
            const [prompt, setPrompt] = useState("");
            const [image, setImage] = useState(null);
            const [loading, setLoading] = useState(false);

            const handleGen = async () => {
                if (!prompt) return showToast("Prompt tidak boleh kosong", "error");
                setLoading(true);
                try {
                    const url = await AI.generateImage(prompt);
                    setImage(url);
                    showToast("Gambar berhasil dibuat!");
                } catch (e) {
                    showToast(e.message, "error");
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="max-w-2xl space-y-6">
                    <h3 className="text-xl font-bold">Affiliate Studio</h3>
                    <textarea 
                        className="w-full bg-white/5 border border-white/10 rounded-2xl p-4 text-white focus:outline-none focus:border-red-600" 
                        placeholder="Masukkan deskripsi gambar..."
                        rows="4"
                        value={prompt}
                        onChange={(e) => setPrompt(e.target.value)}
                    ></textarea>
                    <button 
                        onClick={handleGen} 
                        disabled={loading}
                        className="bg-red-600 hover:bg-red-700 text-white font-bold py-4 px-8 rounded-2xl w-full transition disabled:opacity-50"
                    >
                        {loading ? "Sedang Merender..." : "Mulai Render Gambar"}
                    </button>
                    {image && <img src={image} className="w-full rounded-2xl border border-white/10 mt-6 shadow-2xl" />}
                </div>
            );
        }

        function AuthScreen({ showToast, supabase }) {
            const [email, setEmail] = useState("");
            const [password, setPassword] = useState("");
            const [loading, setLoading] = useState(false);

            const handleLogin = async (e) => {
                e.preventDefault();
                setLoading(true);
                const { error } = await supabase.auth.signInWithPassword({ email, password });
                if (error) {
                    const { error: signUpErr } = await supabase.auth.signUp({ email, password });
                    if (signUpErr) showToast(signUpErr.message, "error");
                    else showToast("Berhasil mendaftar! Silakan login.");
                }
                setLoading(false);
            };

            return (
                <div className="h-screen flex items-center justify-center bg-black p-4">
                    <div className="bg-white/5 border border-white/10 p-8 rounded-3xl w-full max-w-sm space-y-6">
                        <div className="text-center">
                            <h1 className="text-2xl font-black">VIREXA STUDIO</h1>
                            <p className="text-xs text-gray-500 mt-2 tracking-widest uppercase">Akses Masuk</p>
                        </div>
                        <form onSubmit={handleLogin} className="space-y-4">
                            <input type="email" placeholder="Email" className="w-full bg-black/50 border border-white/10 p-4 rounded-xl focus:outline-none focus:border-red-600" onChange={e => setEmail(e.target.value)} />
                            <input type="password" placeholder="Password" className="w-full bg-black/50 border border-white/10 p-4 rounded-xl focus:outline-none focus:border-red-600" onChange={e => setPassword(e.target.value)} />
                            <button className="w-full bg-red-600 py-4 rounded-xl font-bold hover:bg-red-700 transition">{loading ? "Memproses..." : "Masuk ke Studio"}</button>
                        </form>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
