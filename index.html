        }

            cursor: not-allowed;

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const apiKey = ""; 
        
        const fetchWithRetry = async (url, options, retries = 2) => {
            const delays = [500, 1000]; 
            for (let i = 0; i <= retries; i++) {
                try {
                    if (options.signal && options.signal.aborted) throw new Error("Proses dihentikan pengguna");
                    
                    const response = await fetch(url, options);
                    if (!response.ok) {
                        const errText = await response.text();
                        let errMsg = `HTTP ${response.status}: ${errText}`;
                        try {
                            const errJson = JSON.parse(errText);
                            errMsg = errJson.error?.message || errMsg;
                        } catch(e){}
                        
                        const err = new Error(errMsg);
                        if (response.status >= 400 && response.status < 500) err.isTerminal = true;
                        throw err;
                    }
                    return await response.json();
                } catch (error) {
                    if (error.isTerminal || i === retries || (options.signal && options.signal.aborted)) throw error;
                    await new Promise(resolve => setTimeout(resolve, delays[i]));
                }
            }
        };

        const AI = {
            generateText: async (prompt, base64Image = null, signal = null) => {
                let parts = [{ text: prompt }];
                if (base64Image) {
                    parts.push({ inlineData: { mimeType: "image/jpeg", data: base64Image } });
                }
                const payload = { contents: [{ parts }] };
                const data = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload),
                    signal: signal
                });
                return data.candidates?.[0]?.content?.parts?.[0]?.text || "";
            },

            editImage: async (base64Images, prompt, ratio = "1:1", signal = null) => {
                const imagesArray = Array.isArray(base64Images) ? base64Images : [base64Images];
                const imageParts = imagesArray.map(base64 => ({
                    inlineData: { mimeType: "image/jpeg", data: base64 }
                }));

                const payload = {
                    contents: [{ parts: [ { text: prompt }, ...imageParts ] }],
                    generationConfig: { responseModalities: ['TEXT', 'IMAGE'] } 
                };
                
                const data = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-image-preview:generateContent?key=${apiKey}`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload),
                    signal: signal 
                });

                const base64 = data.candidates?.[0]?.content?.parts?.find(p => p.inlineData)?.inlineData?.data;
                if (!base64) throw new Error("AI gagal merender gambar, coba gunakan prompt/gambar lain.");
                return `data:image/jpeg;base64,${base64}`;
            }
        };

        const compressImage = (file) => new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (event) => {
                const img = new Image();
                img.src = event.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 800; 
                    const scaleSize = MAX_WIDTH / img.width;
                    canvas.width = MAX_WIDTH;
                    canvas.height = img.height * scaleSize;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
                    resolve(dataUrl.split(',')[1]);
                };
            };
        });

        const extractFrameFromVideo = (file) => {
            return new Promise((resolve, reject) => {
                const video = document.createElement('video');
                video.preload = 'metadata';
                video.playsInline = true;
                video.muted = true;
                video.src = URL.createObjectURL(file);
                
                video.onloadeddata = () => {
                    video.currentTime = Math.min(1, video.duration / 2); 
                };
                
                video.onseeked = () => {
                    const canvas = document.createElement('canvas');
                    let targetWidth = video.videoWidth;
                    let targetHeight = video.videoHeight;
                    if (targetWidth > 800) {
                        targetHeight = Math.floor(targetHeight * (800 / targetWidth));
                        targetWidth = 800;
                    }
                    canvas.width = targetWidth;
                    canvas.height = targetHeight;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    const base64 = canvas.toDataURL('image/jpeg', 0.8).split(',')[1];
                    URL.revokeObjectURL(video.src);
                    resolve(base64);
                };
                
                video.onerror = () => reject(new Error("Gagal memuat video"));
            });
        };

        const copyToClipboard = async (text) => {
            try {
                const textArea = document.createElement("textarea");
                textArea.value = text;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                return true;
            } catch (err) { return false; }
        };

        const downloadImageWithExactRatio = (url, filename, targetRatioStr = "9:16") => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                let targetRatio = 9 / 16;
                if (targetRatioStr === "16:9") targetRatio = 16 / 9;
                if (targetRatioStr === "1:1") targetRatio = 1;

                const currentRatio = img.width / img.height;
                let sourceX = 0, sourceY = 0, sourceWidth = img.width, sourceHeight = img.height;

                if (currentRatio > targetRatio) {
                    sourceWidth = img.height * targetRatio;
                    sourceX = (img.width - sourceWidth) / 2;
                } else if (currentRatio < targetRatio) {
                    sourceHeight = img.width / targetRatio;
                    sourceY = (img.height - sourceHeight) / 2;
                }

                canvas.width = sourceWidth;
                canvas.height = sourceHeight;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, sourceX, sourceY, sourceWidth, sourceHeight, 0, 0, canvas.width, canvas.height);
                
                const link = document.createElement('a');
                link.href = canvas.toDataURL('image/jpeg', 1.0);
                link.download = filename || 'virexa-render-hq.jpg';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };
            img.src = url;
        };

        const downloadImage = (url, filename) => {
            const link = document.createElement('a');
            link.href = url;
            link.download = filename || 'virexa-render.jpg';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        };

        // ==========================================
        // KOMPONEN UTAMA (AUTH BYPASSED)
        // ==========================================

                    {/* NEW FEATURE: Injeksi CSS Khusus Android (Responsive Overrides) */}

                            .android-mode .sidebar { position: absolute; bottom: 0; left: 0; width: 100%; height: 80px; flex-direction: row !important; z-index: 50; padding: 0 !important; border-right: none; border-top: 1px solid rgba(255,255,255,0.1); background: rgba(5, 0, 0, 0.95); backdrop-filter: blur(10px); }
                            .android-mode .sidebar > div:first-child, .android-mode .sidebar > div:last-child { display: none !important; }
                            .android-mode .sidebar nav { flex-direction: row !important; display: flex; width: 100%; justify-content: space-around; align-items: center; }
                            .android-mode .nav-item { flex-direction: column; padding: 10px 0; border: none !important; background: transparent !important; gap: 6px; }
                            .android-mode .nav-item i { font-size: 24px; }

                            .android-mode main { padding: 20px !important; padding-bottom: 100px !important; }
                            .android-mode .grid { grid-template-columns: 1fr !important; }
                            .android-mode .lg\\:col-span-5, .android-mode .lg\\:col-span-7 { grid-column: span 1 / span 1 !important; }

                            .android-mode-back { left: 300px; }

                        `}</style>
                    )}

                    {/* NEW FEATURE: Tombol Back (Kiri Atas), hanya tampil jika bukan di Home */}
                    {activeTab !== 'home' && (
                        <button onClick={() => setActiveTab('home')} className="fixed top-4 z-[999] flex items-center gap-2 bg-red-900/40 hover:bg-red-600 backdrop-blur px-4 py-2.5 rounded-xl border border-red-500/30 text-white shadow-[0_0_15px_rgba(220,38,38,0.3)] transition-all android-mode-back">
                            <i className="ph-bold ph-arrow-left text-lg"></i>
                            <span className="text-[10px] font-bold uppercase tracking-widest hidden sm:block">Kembali</span>
                        </button>
                    )}

                    {/* NEW FEATURE: Wrapper dinamis (Kode lama di dalamnya 100% UTUH) */}
                    <div className={`flex h-screen overflow-hidden ${viewMode === 'android' ? 'android-mode' : 'w-full'}`}>
                        <aside className="sidebar flex flex-col h-full shrink-0">
                            <div className="p-8 mb-4">
                                <h1 className="text-xl font-black italic tracking-tighter text-white uppercase flex items-center">
                                    <i className="ph-fill ph-sparkle text-red-600 mr-2 text-2xl"></i>VIREXA STUDIO
                                </h1>
                            </div>

                            <nav className="flex-1">
                                <NavItem active={activeTab === 'home'} onClick={() => setActiveTab('home')} icon="ph-squares-four" label="Beranda" />

                                        </div>
                                        <div className="overflow-hidden">

                        <main className="flex-1 overflow-y-auto p-12 bg-[#050000]">

                    </div>
                </>
            );
        }

        function AffiliateView() {
            const [prodFile, setProdFile] = useState(null);
            const [prodPreview, setProdPreview] = useState(null);
            const [modelFile, setModelFile] = useState(null);
            const [modelPreview, setModelPreview] = useState(null);
            const [storeName, setStoreName] = useState("");
            const [prompt, setPrompt] = useState("");
            const [style, setStyle] = useState("Studio");
            const [ratio, setRatio] = useState("9:16");
            const [results, setResults] = useState([]);
            const [loading, setLoading] = useState(false);
            const [progressMsg, setProgressMsg] = useState("");

            const [progressPct, setProgressPct] = useState(0); 
            const abortControllerRef = useRef(null);

            const handleFile = (e, type) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = () => {
                        if (type === 'prod') { setProdFile(file); setProdPreview(reader.result); }
                        else { setModelFile(file); setModelPreview(reader.result); }
                    };
                    reader.readAsDataURL(file);
                }
            };

            const handleStop = () => {
                if (abortControllerRef.current) abortControllerRef.current.abort();
                setLoading(false);
                setProgressMsg("Proses dihentikan manual!");
                setProgressPct(0);
            };

            const handleGen = async () => {
                if (!prodFile || !modelFile) return alert("PENTING: Unggah foto Produk & Wajah Model!");
                setLoading(true); setResults([]);
                setProgressPct(0); 
                
                abortControllerRef.current = new AbortController(); 
                const signal = abortControllerRef.current.signal; 

                try {
                    setProgressMsg("Mengecilkan Gambar (Anti-Error 400)...");
                    setProgressPct(5); 
                    const b64Prod = await compressImage(prodFile);
                    const b64Model = await compressImage(modelFile);
                    setProgressPct(10);

        function FinderView() {
            const [preview, setPreview] = useState(null);
            const [b64, setB64] = useState("");
            const [loading, setLoading] = useState(false);
            const [res, setRes] = useState("");
            
            const [isVideo, setIsVideo] = useState(false);
            const [language, setLanguage] = useState("English");
            const [targetLocation, setTargetLocation] = useState("Default");

            const [progressPct, setProgressPct] = useState(0);

            const handleMediaChange = async (e) => {
                const file = e.target.files[0];
                if (file) {
                    if (preview) URL.revokeObjectURL(preview);
                    setRes("");
                    
                    if (file.type.startsWith('video/')) {
                        setIsVideo(true);
                        setPreview(null);
                        try {
                            const base64Frame = await extractFrameFromVideo(file);
                            setPreview(`data:image/jpeg;base64,${base64Frame}`);
                            setB64(base64Frame);
                        } catch (err) {
                            alert("Gagal mengambil frame dari video.");
                        }
                    } else {
                        setIsVideo(false);
                        setPreview(URL.createObjectURL(file));
                        setB64(await compressImage(file));
                    }
                }
            };

            const handleAnalyze = async () => {
                if(!b64) return;
                setLoading(true); setRes("");
                
                setProgressPct(10);
                const simInterval = setInterval(() => setProgressPct(p => p < 90 ? p + Math.floor(Math.random() * 8) : 90), 800);

                try {
                    const locationInstruction = targetLocation !== "Default" 
                        ? `PENTING: Ubah latar belakang (background) dan lingkungan/environment subjek menjadi: ${targetLocation}. Pertahankan identitas subjek utama persis seperti gambar asli, tapi letakkan di lokasi baru ini secara natural.`
                        : "Pertahankan latar belakang dan lingkungan persis seperti gambar asli (Akurasi 99.9%).";

                    const systemPrompt = `Tugas: Analisis gambar yang diunggah SECARA SANGAT MENDALAM. Perhatikan seluruh komponen sekecil apapun (subjek, ekspresi, pakaian, properti, pencahayaan).
Anda WAJIB meniru semua isinya lalu men-generate "Main Prompt" dan "Negative Prompt" yang jika digunakan pada AI Generator akan menghasilkan visual yang 99.9% sama persis dengan gambar yang diupload ini.

Lingkungan/Background: ${locationInstruction}
Wajib gunakan bahasa: ${language}.

Format Balasan WAJIB persis seperti ini:
[MAIN PROMPT]
(tulis prompt sangat detail dan deskriptif dalam bahasa ${language})

[NEGATIVE PROMPT]
(tulis hal-hal yang dilarang/dihindari agar hasil realistis dan tidak cacat, dalam bahasa ${language})`;

                    const result = await AI.generateText(systemPrompt, b64);
                    
                    clearInterval(simInterval);
                    setProgressPct(100);
                    setRes(result);
                } catch (e) { 
                    clearInterval(simInterval);
                    setProgressPct(0);
                    alert("Gagal: " + e.message); 
                }
                setLoading(false);
                setTimeout(() => setProgressPct(0), 1500); 
            };

            return (
                <div className="space-y-10 animate-in fade-in">
                    <h2 className="text-4xl font-black text-white uppercase flex items-center tracking-tighter"><i className="ph-fill ph-magnifying-glass text-red-600 mr-4"></i>Prompt Finder</h2>
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-10">
                        <div className="glass-panel p-8 space-y-6 relative">
                            <div className="upload-placeholder h-80 border-dashed border-white/20 relative">
                                {preview ? (
                                    <>
                                        <img src={preview} className="w-full h-full object-cover" />
                                        {isVideo && (
                                            <div className="absolute top-2 left-2 bg-red-600/90 px-3 py-1 rounded-lg text-white font-bold text-xs uppercase tracking-widest shadow-lg border border-white/40">
                                                Video Frame
                                            </div>
                                        )}
                                        <div className="delete-overlay" onClick={() => {setB64(""); setPreview(null); setIsVideo(false);}}><i className="ph-bold ph-trash mr-1"></i>Hapus</div>
                                    </>
                                ) : (
                                    <label className="text-center group cursor-pointer w-full h-full flex flex-col items-center justify-center">
                                        <i className="ph ph-camera text-4xl text-gray-700 group-hover:text-red-600 transition-colors"></i>
                                        <p className="mt-4 text-[10px] font-black text-gray-600 uppercase tracking-widest">Upload Gambar / Video</p>
                                        <input type="file" accept="image/*,video/mp4,video/webm,video/quicktime" onChange={handleMediaChange} className="hidden" />
                                    </label>
                                )}
                            </div>
                            
                            <button onClick={handleAnalyze} disabled={loading} className="btn-red relative overflow-hidden">
                                {loading && <div className="absolute left-0 top-0 h-full bg-red-900/80 transition-all duration-300" style={{ width: `${progressPct}%` }}></div>}
                                <span className="relative z-10 flex items-center justify-center gap-2">
                                    {loading ? <i className="ph ph-spinner animate-spin text-xl"></i> : ""}
                                    {loading ? `Menganalisis... ${progressPct}%` : "Bongkar Prompt"}
                                </span>
                            </button>
                            
                            <div className="w-full mt-1">
                                <label className="block text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-1">Ganti Lokasi (Environment)</label>
                                <select 
                                    value={targetLocation} 
                                    onChange={(e) => setTargetLocation(e.target.value)} 
                                    className="w-full bg-black/50 border border-white/20 rounded-xl p-3 text-xs text-white focus:outline-none focus:border-red-500 transition-all font-bold"
                                >
                                    <option value="Default">1. Gambar Default (Sesuai Asli)</option>
                                    <option value="Hutan Belantara yang rimbun dan misterius">2. Hutan</option>
                                    <option value="Jalanan Kota / Street yang estetik">3. Jalanan</option>
                                    <option value="Tepi Laut / Pantai yang indah">4. Tepi Laut</option>
                                    <option value="Di tengah Keramaian orang / kota sibuk">5. Di Keramaian</option>
                                    <option value="Lokasi Acak (Pilih lokasi paling epik dan kreatif menurut AI)">6. Random Lokasi (AI)</option>
                                </select>
                            </div>
                            
                            <div className="flex gap-3 w-full mt-2">
                                <button 
                                    onClick={() => setLanguage("Indonesia")} 
                                    className={`flex-1 py-2.5 text-[10px] font-bold uppercase tracking-widest rounded-xl transition-all border ${language === 'Indonesia' ? 'bg-red-600 border-red-500 text-white shadow-lg' : 'bg-black/50 border-white/20 text-gray-500 hover:text-white'}`}
                                >Indonesia</button>
                                <button 
                                    onClick={() => setLanguage("English")} 
                                    className={`flex-1 py-2.5 text-[10px] font-bold uppercase tracking-widest rounded-xl transition-all border ${language === 'English' ? 'bg-red-600 border-red-500 text-white shadow-lg' : 'bg-black/50 border-white/20 text-gray-500 hover:text-white'}`}
                                >English</button>
                            </div>
                        </div>
                        
                        <div className="naskah-box min-h-[400px] flex flex-col justify-between">
                            <div>
                                <p className="text-[10px] font-black text-red-500 mb-6 uppercase tracking-widest">Master Prompt Output:</p>
                                <p className="text-gray-300 text-sm font-mono leading-loose whitespace-pre-wrap">{res || "Bongkar prompt..."}</p>
                            </div>
                            {res && <button onClick={() => copyToClipboard(res).then(ok => ok && alert('Salin sukses'))} className="mt-8 text-[11px] font-black text-white hover:text-red-500 flex items-center gap-2 uppercase tracking-widest"><i className="ph ph-copy"></i> Salin Prompt</button>}
                        </div>
                    </div>
                </div>
            );
        }

        function AlgoView({ showToast, saveHistory }) {
            const [loading, setLoading] = useState(false);
            const [preview, setPreview] = useState(null);
            const [b64, setB64] = useState("");
            const [scriptTitle, setScriptTitle] = useState("");
            
            const [generatedData, setGeneratedData] = useState(null); 

            const [generatedAlgoImage, setGeneratedAlgoImage] = useState(null);
            const [isGeneratingAlgoImage, setIsGeneratingAlgoImage] = useState(false);

            const [naskahProgressPct, setNaskahProgressPct] = useState(0);
            const [imageProgressPct, setImageProgressPct] = useState(0);

            const handleImageChange = async (e) => {
                const file = e.target.files[0];
                if (file) {
                    if (preview) URL.revokeObjectURL(preview);
                    setPreview(URL.createObjectURL(file));
                    setGeneratedData(null);
                    setGeneratedAlgoImage(null);
                    try {
                        setB64(await compressImage(file));
                    } catch (err) {
                        alert("Gagal memproses gambar");
                    }
                }
            };

            const handleGenerateAlgoImage = async () => {
                if (!b64) return alert("Silakan unggah foto terlebih dahulu!");
                setIsGeneratingAlgoImage(true);
                
                setImageProgressPct(15);
                const imgInterval = setInterval(() => setImageProgressPct(p => p < 85 ? p + Math.floor(Math.random() * 8) : 85), 1000);

                try {
                    const studioBackgrounds = [
                        "modern, aesthetic, professional TikTok creator studio with cool neon lighting",
                        "cozy podcast studio setup with warm fairy lights and acoustic foam",
                        "futuristic cyberpunk room with vibrant RGB LEDs and high-tech vibes",
                        "minimalist bright room with large window natural lighting and clean background",
                        "luxury executive loft with dark wood and warm golden hour lighting"
                    ];
                    const randomBg = studioBackgrounds[Math.floor(Math.random() * studioBackgrounds.length)];

                    const prompt = `A hyper-realistic vertical 9:16 portrait of the EXACT same person from the reference image. The person is holding a physical TikTok logo placard/sign. They are standing or sitting in a ${randomBg}. High quality, 8k resolution, commercial photography.`;
                    const url = await AI.editImage([b64], prompt, "9:16", null);
                    
                    clearInterval(imgInterval);
                    setImageProgressPct(100);
                    setGeneratedAlgoImage(url);
                    alert("Gambar TikTok Studio berhasil dibuat!");
                } catch (error) {
                    clearInterval(imgInterval);
                    setImageProgressPct(0);
                    alert(error.message || "Gagal menghasilkan gambar studio");
                } finally {
                    setIsGeneratingAlgoImage(false);
                    setTimeout(() => setImageProgressPct(0), 1500); 
                }
            };

            const handleGen = async () => {
                if(!b64) return alert("Upload foto!");
                setLoading(true); setGeneratedData(null);
                
                setNaskahProgressPct(10);
                const textInterval = setInterval(() => setNaskahProgressPct(p => p < 90 ? p + Math.floor(Math.random() * 10) : 90), 800);

                try {
                    const safeTitle = scriptTitle.trim() !== "" ? scriptTitle : "Sesuai dengan konteks di dalam foto";
                    const currentYear = new Date().getFullYear();
                    
                    const systemPrompt = `Anda adalah ahli pembuat naskah TikTok.
                    Judul/Tema Naskah: ${safeTitle}.
                    Tugas Anda: Analisis foto secara detail dan buatkan "Prompt Algoritma Tiktok" berdasarkan naskah baku berikut.
                    
                    🎬 NASKAH VIDEO TIKTOK (EDUKASI ALGORITMA TIKTOK)
                    Buatkan versi durasi 18 detik 3 scane konsisten Transi lanjutan video 1 ke 2 ke 3
                    pragrap bahasa inggris dialog bahasa indonesia.
                    Dibuat di AI GENERATOR. 
                    
                    Tambahkan di setiap prompt semua video:
                    natural blinking
                    skin texture realistic
                    hand gesture natural
                    subtle breathing movement
                    real Indonesian environment
                    smartphone camera realism
                    
                    🎵 Musik: fyf ⏱ Jam Posting : Fyp
                    Durasi total 18 detik (3 scene x 6 detik), gaya natural seperti rekam story.
                    Aman pedoman TikTok.
                    Rasio :9:16Versi : vartikal tiktok
                    Video terakhir Follow, Sukai, Komentar dan Bagikan?
                    Tex Layar Besar Setiap video.
                    JUDUL, KATA KUNCI SEO CAPTION SINGKAT
                    TAGAR : #wawasancreatorinsight#creatotorsearchinsiphts dan 3 tagar yang relevan
                    
                    1️⃣ HOOK (3–7 detik) 2️⃣ SOLUSI (7–14 detik) 3️⃣ CTA / Engagement (14–21 detik) 
                    Wajib Menyebut Merek Produk. Produk tidak berlebihan) 👉 Wajib Menyebut Merek Produk (tidak berlebihan)
                    👉 Wajib Menyebut Merek Produk. Dialog, buatkan jangan terlalu formal buat yang biasa layaknya manusia.
                    
                    Referensi Dialog (Gunakan tahun ${currentYear} sesuai situasi berjalan):
                    "Selamat, Anda terpilih. Algoritma TikTok Tahun ${currentYear} aktif sekarang. Kalau video ini muncul di kamu, segera lakukan lima tanda di pojok kanan. Ini cara TikTok baca minatmu. Lakukan sekarang, follow, sukai komentar, dan bagikan. Bantu algoritma kirim konten ini ke lebih banyak orang." 
                    ATAU 
                    "Selamat! Anda terpilih! Algoritma TikTok ${currentYear} aktif sekarang. Segera lakukan lima tanda di pojok kanan. Ini sinyal yang dibaca sistem. Lakukan sekarang! Follow, sukai komentar, dan bagikan. Jangan cuma nonton."
                    
                    Keluarkan hasil HANYA dalam format JSON valid tanpa format markdown atau teks lain. Struktur JSON:
                    {
                      "metadata": "JUDUL: ...\\nCAPTION: ...\\nTAGAR: ...",
                      "scenes": [
                        {
                          "scene": 1,
                          "visualPrompt": "Teks bahasa inggris untuk AI Image Generator mendeskripsikan model dan produk secara detail...",
                          "dialog": "Teks bahasa indonesia..."
                        },
                        { "scene": 2, "visualPrompt": "...", "dialog": "..." },
                        { "scene": 3, "visualPrompt": "...", "dialog": "..." }
                      ]
                    }`;

                    const result = await AI.generateText(systemPrompt, b64);
                    
                    let parsedData;
                    try {
                        const cleanJson = result.replace(/\`\`\`json/gi, '').replace(/\`\`\`/g, '').trim();
                        parsedData = JSON.parse(cleanJson);
                    } catch (e) {
                        throw new Error("Gagal mengurai format JSON dari AI. Coba klik Generate lagi.");
                    }
                    
                    clearInterval(textInterval);
                    setNaskahProgressPct(100);
                    setGeneratedData(parsedData);
                } catch (e) { 
                    clearInterval(textInterval);
                    setNaskahProgressPct(0);
                    alert("Gagal: " + e.message); 
                }
                setLoading(false);
                setTimeout(() => setNaskahProgressPct(0), 1500); 
            };

            return (
                <div className="space-y-10 animate-in fade-in">

                                {preview ? (
                                    <>
                                        <img src={preview} /><div className="delete-overlay" onClick={() => {setB64(""); setPreview(null); setGeneratedAlgoImage(null); setGeneratedData(null);}}><i className="ph-bold ph-trash mr-1"></i>Hapus</div>

                                        <button onClick={() => setGeneratedAlgoImage(null)} className="absolute top-2 right-2 bg-black/80 px-2 py-1.5 rounded-lg text-white border border-white/20 hover:bg-red-600 transition-colors text-xs font-bold shadow-lg flex items-center gap-1">
                                            <i className="ph-bold ph-trash"></i> Hapus

                                    </div>

                                >
                                    {isGeneratingAlgoImage && <div className="absolute left-0 top-0 h-full bg-red-900/40 transition-all duration-300" style={{ width: `${imageProgressPct}%` }}></div>}

                                        <span className="whitespace-nowrap">{isGeneratingAlgoImage ? `Merender Studio... ${imageProgressPct}%` : "Generate Gambar Studio TikTok"}</span>

                                </button>

                            <div>
                                <label className="block text-sm font-bold text-white mb-2 drop-shadow-[0_0_5px_rgba(255,255,255,0.3)]">Judul Naskah (opsional)</label>

                                  value={scriptTitle}
                                  onChange={(e) => setScriptTitle(e.target.value)}

                                />
                            </div>

                            <button onClick={handleGen} disabled={loading} className="btn-red mt-auto relative overflow-hidden">
                                {loading && <div className="absolute left-0 top-0 h-full bg-red-900/80 transition-all duration-300" style={{ width: `${naskahProgressPct}%` }}></div>}
                                <span className="relative z-10 flex items-center justify-center gap-2">
                                    {loading ? <i className="ph ph-spinner animate-spin text-xl"></i> : ""}
                                    {loading ? `Menyusun... ${naskahProgressPct}%` : "Generate Naskah FYP"}
                                </span>
                            </button>
                        </div>
                        
                        <div className="naskah-box min-h-[400px] flex flex-col justify-start">
                            {!generatedData ? (
                                <div className="h-full flex items-center justify-center text-sm text-gray-500 font-medium text-center">
                                    Klik tombol untuk mendapatkan formula viral...
                                </div>
                            ) : (
                                <div className="space-y-6">
                                    {/* METADATA */}
                                    <div className="bg-[#110000] border border-white/10 p-4 rounded-xl shadow-inner">
                                        <div className="flex justify-between items-center mb-2">
                                            <span className="text-[10px] font-bold text-red-500 uppercase tracking-widest">Metadata</span>
                                            <button onClick={() => copyToClipboard(generatedData.metadata).then(ok => ok && alert('Metadata tersalin!'))} className="text-gray-500 hover:text-white transition-colors"><i className="ph-bold ph-copy text-lg"></i></button>
                                        </div>
                                        <p className="whitespace-pre-wrap text-sm text-gray-300 font-mono leading-relaxed">{generatedData.metadata}</p>
                                    </div>
                                    
                                    {/* SCENES */}
                                    {generatedData.scenes && generatedData.scenes.map((s, idx) => (
                                        <div key={idx} className="bg-black/50 border border-white/10 p-5 rounded-xl">
                                            <h4 className="text-red-500 font-black text-xs uppercase tracking-widest mb-4 border-b border-white/10 pb-2">🎬 SCENE {s.scene}</h4>
                                            
                                            <div className="mb-4">
                                                <div className="flex justify-between items-center mb-1">
                                                    <span className="text-[10px] text-gray-400 font-bold uppercase">Visual Prompt AI:</span>
                                                    <button onClick={() => copyToClipboard(s.visualPrompt).then(ok => ok && alert('Visual Prompt tersalin!'))} className="text-gray-500 hover:text-white transition-colors"><i className="ph-bold ph-copy text-lg"></i></button>
                                                </div>
                                                <p className="text-xs text-gray-300 font-mono bg-[#050000] p-3 rounded-lg border border-white/5">{s.visualPrompt}</p>
                                            </div>
                                            
                                            <div>
                                                <div className="flex justify-between items-center mb-1">
                                                    <span className="text-[10px] text-gray-400 font-bold uppercase">Dialog:</span>
                                                    <button onClick={() => copyToClipboard(s.dialog).then(ok => ok && alert('Dialog tersalin!'))} className="text-gray-500 hover:text-white transition-colors"><i className="ph-bold ph-copy text-lg"></i></button>
                                                </div>
                                                <p className="text-sm text-white italic bg-[#1a0505] p-3 rounded-lg border border-red-900/30">"{s.dialog}"</p>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
