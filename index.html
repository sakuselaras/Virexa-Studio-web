<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virexa Studio - Portal Kreator Pro</title>
    
    <!-- Framework & Icons -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #050000; }
        ::-webkit-scrollbar-thumb { background: #4a0404; border-radius: 10px; }
        body { background-color: #050000; color: #f3f4f6; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .glass-sidebar { background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(25px); border-right: 1px solid rgba(255, 255, 255, 0.1); }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .active-tab { background: linear-gradient(90deg, rgba(153, 27, 27, 0.4) 0%, rgba(0,0,0,0) 100%); border-left: 4px solid #dc2626; color: white; }
        .input-dark { background: rgba(0,0,0,0.7); border: 1px solid rgba(255,255,255,0.1); color: white; outline: none; transition: all 0.3s; }
        .input-dark:focus { border-color: #dc2626; box-shadow: 0 0 20px rgba(220, 38, 38, 0.2); }
        .btn-primary { background: linear-gradient(to right, #991b1b, #dc2626); transition: all 0.3s; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(220, 38, 38, 0.5); }
        .drop-shadow-glow { filter: drop-shadow(0 0 15px rgba(220, 38, 38, 0.6)); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ============================================================
        // 1. CONFIGURATION
        // ============================================================
        const BACKEND_URL = "https://virexa-backend.vercel.app"; 
        const SUPABASE_URL = 'https://pgefqhpomzjbqbqobkta.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_YO3yI5L3PSXl2X9VXhwRcQ_OID1tZdo';
        
        // PENTING: Nama unik agar tidak redeclare
        var virexaAuth = null;
        if (window.supabase) {
            virexaAuth = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        }

        // --- API GATEWAY ---
        const AI = {
            call: async (endpoint, payload) => {
                const res = await fetch(`${BACKEND_URL}/api/${endpoint}`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                if (!data.success) throw new Error(data.error || "Gagal menghubungi server AI");
                return data;
            }
        };

        const fileToBase64 = (file) => new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result.split(',')[1]);
        });

        // ============================================================
        // 2. MAIN APPLICATION (RESTORED FEATURES)
        // ============================================================
        function App() {
            const [user, setUser] = useState(null);
            const [activeTab, setActiveTab] = useState('home');
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                if (!virexaAuth) return;
                virexaAuth.auth.getSession().then(({ data: { session } }) => {
                    setUser(session?.user ?? null);
                    setLoading(false);
                });
                const { data: { subscription } } = virexaAuth.auth.onAuthStateChange((_event, session) => {
                    setUser(session?.user ?? null);
                });
                return () => subscription.unsubscribe();
            }, []);

            if (loading) return (
                <div className="h-screen flex flex-col items-center justify-center bg-black">
                    <i className="ph ph-spinner-gap animate-spin text-6xl text-red-600"></i>
                    <p className="text-gray-500 mt-8 font-black tracking-[0.4em] uppercase text-xs animate-pulse">Virexa Engine Restoring...</p>
                </div>
            );

            // Tampilkan Layar Login jika user belum masuk
            if (!user) return <AuthScreen />;

            // TAMPILAN FULL STUDIO SETELAH LOGIN
            return (
                <div className="flex h-screen overflow-hidden bg-black text-gray-200">
                    {/* SIDEBAR NAVIGASI */}
                    <aside className="w-80 glass-sidebar flex flex-col p-8 shrink-0 relative">
                        <div className="flex items-center gap-3 mb-16 relative z-10">
                            <i className="ph-fill ph-sparkle text-5xl text-red-600 drop-shadow-glow"></i>
                            <h1 className="text-3xl font-black tracking-tighter text-white">VIREXA</h1>
                        </div>
                        
                        <nav className="flex-1 space-y-3 relative z-10">
                            <NavBtn id="home" icon="ph-house" label="Dashboard" active={activeTab} onClick={setActiveTab} />
                            <div className="pt-10 pb-4 text-[11px] font-black text-gray-600 uppercase tracking-[0.3em] px-4">Studio Tools</div>
                            <NavBtn id="affiliate" icon="ph-image" label="Affiliate Studio" active={activeTab} onClick={setActiveTab} />
                            <NavBtn id="tiktok" icon="ph-tiktok-logo" label="TikTok Factory" active={activeTab} onClick={setActiveTab} />
                            <NavBtn id="finder" icon="ph-magnifying-glass" label="Prompt Finder" active={activeTab} onClick={setActiveTab} />
                            <NavBtn id="algo" icon="ph-wand" label="TikTok Algo Prompt" active={activeTab} onClick={setActiveTab} />
                        </nav>

                        <div className="pt-10 border-t border-white/10 mt-auto relative z-10">
                            <div className="bg-red-600/5 p-5 rounded-3xl mb-6 border border-red-600/20">
                                <p className="text-[10px] text-gray-500 font-bold uppercase truncate mb-1">{user.email}</p>
                                <p className="text-[10px] text-red-500 font-black tracking-widest">PRO CREATOR ACCESS</p>
                            </div>
                            <button onClick={() => virexaAuth.auth.signOut()} className="w-full py-4 rounded-2xl bg-red-950/30 text-red-500 text-xs font-black hover:bg-red-600 hover:text-white transition-all shadow-lg">KELUAR SISTEM</button>
                        </div>
                    </aside>

                    {/* CONTENT AREA */}
                    <main className="flex-1 overflow-y-auto p-12 bg-[#050000]">
                        <div className="max-w-6xl mx-auto">
                            {activeTab === 'home' && <HomeView setActiveTab={setActiveTab} user={user} />}
                            {activeTab === 'affiliate' && <AffiliateView />}
                            {activeTab === 'tiktok' && <TikTokView />}
                            {activeTab === 'finder' && <FinderView />}
                            {activeTab === 'algo' && <AlgoView />}
                        </div>
                    </main>
                </div>
            );
        }

        function NavBtn({ id, icon, label, active, onClick }) {
            return (
                <button onClick={() => onClick(id)} className={`w-full flex items-center gap-5 px-6 py-5 rounded-[24px] transition-all ${active === id ? 'active-tab shadow-xl shadow-red-900/10' : 'text-gray-500 hover:text-gray-200 hover:bg-white/5'}`}>
                    <i className={`ph ${active === id ? 'ph-fill' : ''} ${icon} text-2xl`}></i>
                    <span className="font-black text-sm tracking-tight">{label}</span>
                </button>
            );
        }

        // --- SUB-VIEWS ---

        function HomeView({ setActiveTab, user }) {
            return (
                <div className="space-y-16 animate-in fade-in slide-in-from-bottom-8 duration-700">
                    <header>
                        <p className="text-red-500 font-black tracking-[0.5em] text-xs uppercase mb-4">Portal Dashboard</p>
                        <h2 className="text-6xl font-black text-white leading-[1.1] tracking-tighter">Selamat Datang,<br/><span className="text-red-600 underline decoration-red-900/50">{user.email.split('@')[0]}</span></h2>
                        <p className="text-gray-400 mt-6 text-xl font-medium max-w-2xl">Rumah bagi kreativitas tanpa batas. Semua tool favorit Anda sudah siap di sebelah kiri.</p>
                    </header>
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
                        <QuickCard title="Affiliate" desc="8 Pose Produk & Wajah Model" icon="ph-image" onClick={() => setActiveTab('affiliate')} />
                        <QuickCard title="Factory" desc="3 Scene Naskah Video Viral" icon="ph-tiktok-logo" onClick={() => setActiveTab('tiktok')} />
                        <QuickCard title="Finder" desc="Bedah Prompt dari Gambar" icon="ph-magnifying-glass" onClick={() => setActiveTab('finder')} />
                        <QuickCard title="Algo" desc="Naskah FYP Edukasi Baru" icon="ph-wand" onClick={() => setActiveTab('algo')} />
                    </div>
                </div>
            );
        }

        function QuickCard({ title, desc, icon, onClick }) {
            return (
                <button onClick={onClick} className="glass-card p-10 rounded-[40px] text-left hover:border-red-600 transition-all group relative overflow-hidden">
                    <i className={`ph ${icon} text-5xl mb-8 text-red-600 group-hover:scale-110 transition-transform`}></i>
                    <h3 className="text-xl font-black text-white mb-3 uppercase tracking-tighter">{title}</h3>
                    <p className="text-xs text-gray-500 font-semibold leading-relaxed uppercase tracking-wider">{desc}</p>
                </button>
            );
        }

        function AffiliateView() {
            const [prompt, setPrompt] = useState("");
            const [prodFile, setProdFile] = useState(null);
            const [modelFile, setModelFile] = useState(null);
            const [storeName, setStoreName] = useState("");
            const [results, setResults] = useState([]);
            const [loading, setLoading] = useState(false);
            const [prog, setProg] = useState("");

            const handleGen = async () => {
                if (!prodFile || !modelFile) return alert("PENTING: Unggah foto PRODUK dan wajah MODEL terlebih dahulu!");
                setLoading(true); setResults([]);
                try {
                    const prodB64 = await fileToBase64(prodFile);
                    const modelB64 = await fileToBase64(modelFile);
                    
                    const poses = [
                        "Walking forward dynamically in a luxury studio", 
                        "Holding the product smiling, medium shot",
                        "Sitting elegantly in a modern minimalist office",
                        "High fashion close-up portrait with dramatic lighting",
                        "Commercial product focus, model in background blurred",
                        "Lifestyle action, using the product naturally",
                        "Outdoor casual session, golden hour lighting",
                        "Luxury aesthetic, product presentation on a pedestal"
                    ];
                    
                    for(let i=0; i<poses.length; i++) {
                        setProg(`Merender Pose ${i+1} dari 8...`);
                        
                        // Sisipkan Nama Toko ke 2 pose secara acak
                        const addBranding = (i === 2 || i === 5 && storeName) ? 
                            `. The text '${storeName.toUpperCase()}' is clearly visible in the background as an aesthetic neon sign.` : '';

                        const res = await AI.call('edit-image', { 
                            prompt: `[RATIO 9:16] MANDATORY PORTRAIT. Combine these 2 images. Reference 1: The Product. Reference 2: The Model's Face and Identity. Generate a high-end commercial shot. Pose: ${poses[i]}${addBranding}. KEEP PRODUCT DETAILS 100% ORIGINAL.`, 
                            base64Images: [prodB64, modelB64], 
                            ratio: "9:16" 
                        });
                        setResults(prev => [...prev, res.image]);
                    }
                } catch (e) { alert(e.message); }
                setLoading(false);
            };

            return (
                <div className="space-y-10 animate-in fade-in duration-500">
                    <div className="flex justify-between items-end">
                        <div>
                            <h3 className="text-4xl font-black text-white uppercase tracking-tighter flex items-center gap-4">
                                <i className="ph ph-image text-red-600"></i> Affiliate Studio
                            </h3>
                            <p className="text-gray-400 mt-2 font-bold uppercase tracking-widest text-[10px]">Render 8 Pose Komersial Portrait 9:16</p>
                        </div>
                    </div>
                    
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-12 bg-white/5 p-12 rounded-[50px] border border-white/10 shadow-2xl">
                        <div className="space-y-8">
                            <div className="grid grid-cols-2 gap-6">
                                <div className="space-y-3">
                                    <label className="block text-[11px] font-black text-gray-500 uppercase tracking-[0.3em]">1. Foto Produk</label>
                                    <div className="relative group overflow-hidden rounded-3xl border-2 border-dashed border-white/10 hover:border-red-600/50 transition-all aspect-square flex items-center justify-center bg-black/40">
                                        {prodFile ? <img src={URL.createObjectURL(prodFile)} className="w-full h-full object-cover" /> : <i className="ph ph-plus text-2xl text-gray-700"></i>}
                                        <input type="file" onChange={e => setProdFile(e.target.files[0])} className="absolute inset-0 opacity-0 cursor-pointer" />
                                    </div>
                                </div>
                                <div className="space-y-3">
                                    <label className="block text-[11px] font-black text-gray-500 uppercase tracking-[0.3em]">2. Wajah Model</label>
                                    <div className="relative group overflow-hidden rounded-3xl border-2 border-dashed border-white/10 hover:border-red-600/50 transition-all aspect-square flex items-center justify-center bg-black/40">
                                        {modelFile ? <img src={URL.createObjectURL(modelFile)} className="w-full h-full object-cover" /> : <i className="ph ph-user text-2xl text-gray-700"></i>}
                                        <input type="file" onChange={e => setModelFile(e.target.files[0])} className="absolute inset-0 opacity-0 cursor-pointer" />
                                    </div>
                                </div>
                            </div>
                            <div>
                                <label className="block text-[11px] font-black text-gray-500 uppercase tracking-[0.3em] mb-4">3. Nama Toko (Neon Latar)</label>
                                <input value={storeName} onChange={e => setStoreName(e.target.value)} placeholder="Cth: VIREXA FASHION" className="w-full input-dark rounded-2xl p-5 text-sm font-bold uppercase" />
                            </div>
                            <div>
                                <label className="block text-[11px] font-black text-gray-500 uppercase tracking-[0.3em] mb-4">4. Instruksi Gaya Tambahan</label>
                                <textarea value={prompt} onChange={e => setPrompt(e.target.value)} className="w-full input-dark rounded-3xl p-6 text-sm font-medium" rows="4" placeholder="Misal: 'Tema warna pastel, suasana ceria...'"></textarea>
                            </div>
                            <button onClick={handleGen} disabled={loading} className="w-full btn-primary py-6 rounded-3xl font-black text-white text-lg tracking-tighter uppercase disabled:opacity-50">
                                {loading ? <span className="flex items-center justify-center gap-3"><i className="ph ph-spinner animate-spin"></i> {prog}</span> : "Generate 8 Pose Komersial"}
                            </button>
                        </div>
                        
                        <div className="grid grid-cols-2 gap-4 max-h-[700px] overflow-y-auto pr-4 scroll-smooth">
                            {results.map((img, i) => <img key={i} src={img} className="rounded-[32px] border border-white/10 hover:scale-105 transition-transform shadow-2xl" />)}
                            {loading && <div className="col-span-2 flex flex-col items-center justify-center py-32 gap-6"><i className="ph ph-spinner animate-spin text-6xl text-red-600"></i><p className="text-gray-500 text-xs font-black animate-pulse tracking-[0.3em] uppercase">AI is Creating Magic...</p></div>}
                            {!loading && results.length === 0 && <div className="col-span-2 flex flex-col items-center justify-center py-40 opacity-10"><i className="ph ph-images-square text-8xl mb-6"></i><p className="text-xs font-black uppercase tracking-[0.4em]">Hasil Akan Muncul Di Sini</p></div>}
                        </div>
                    </div>
                </div>
            );
        }

        function TikTokView() {
            const [name, setName] = useState("");
            const [loading, setLoading] = useState(false);
            const [data, setData] = useState(null);

            const handleGen = async () => {
                if (!name) return;
                setLoading(true); setData(null);
                try {
                    const res = await AI.call('generate-text', { 
                        prompt: `Buatkan naskah TikTok 3 scene viral (Hook, Value, CTA) untuk produk: ${name}. JSON format: {"judul":"...","caption":"...","tagar":"#... #...","scenes":[{"visual":"...","dialog":"..."}]}` 
                    });
                    const parsed = JSON.parse(res.text.replace(/```json|```/g, '').trim());
                    setData(parsed);
                } catch (e) { alert("Format naskah error, coba lagi."); }
                setLoading(false);
            };

            return (
                <div className="space-y-10 animate-in fade-in">
                    <h3 className="text-4xl font-black text-white uppercase tracking-tighter flex items-center gap-4">
                        <i className="ph ph-tiktok-logo text-red-600"></i> TikTok Factory
                    </h3>
                    <div className="bg-white/5 p-12 rounded-[50px] border border-white/10 max-w-3xl shadow-2xl">
                        <label className="block text-[11px] font-black text-gray-500 uppercase tracking-widest mb-6">Nama Produk / Topik Campaign</label>
                        <input value={name} onChange={e => setName(e.target.value)} placeholder="Misal: Skincare Pencerah Korea" className="w-full input-dark p-6 rounded-3xl mb-8 text-xl font-bold" />
                        <button onClick={handleGen} className="w-full btn-primary py-6 rounded-3xl font-black text-lg transition-all uppercase tracking-tighter">
                            {loading ? "Menganalisis Tren FYP..." : "Bangun Naskah Video Viral"}
                        </button>
                    </div>
                    {data && (
                        <div className="space-y-10 mt-12 animate-in slide-in-from-bottom-8">
                            <div className="glass-card p-10 rounded-[40px] border-red-900/20">
                                <h4 className="text-red-500 font-black uppercase text-[10px] mb-3 tracking-[0.5em]">SEO Metadata</h4>
                                <h5 className="text-3xl font-bold text-white mb-4 tracking-tight">{data.judul}</h5>
                                <p className="text-gray-400 italic mb-6 leading-relaxed">"{data.caption}"</p>
                                <p className="text-red-400 font-mono text-sm font-bold tracking-widest">{data.tagar}</p>
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                                {data.scenes.map((s, i) => (
                                    <div key={i} className="glass-card p-8 rounded-[40px] border-white/5 relative overflow-hidden">
                                        <div className="bg-red-600 text-[10px] font-black px-4 py-1.5 rounded-full w-fit mb-8 tracking-widest uppercase">SCENE {i+1}</div>
                                        <p className="text-[10px] text-gray-500 mb-4 font-black uppercase tracking-widest">Arah Visual:</p>
                                        <p className="text-sm text-gray-200 leading-relaxed mb-8 font-medium italic">{s.visual}</p>
                                        <p className="text-[10px] text-gray-500 mb-4 font-black uppercase tracking-widest">Naskah Dialog:</p>
                                        <p className="text-xl font-bold text-white leading-tight">"{s.dialog}"</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function FinderView() {
            const [file, setFile] = useState(null);
            const [loading, setLoading] = useState(false);
            const [res, setRes] = useState("");

            const handleAnalyze = async () => {
                if (!file) return;
                setLoading(true);
                try {
                    const b64 = await fileToBase64(file);
                    const data = await AI.call('generate-text', { prompt: "Ekstrak prompt AI Image Generator (Main & Negative) paling detail dari gambar ini dalam Bahasa Inggris.", base64Image: b64 });
                    setRes(data.text);
                } catch (e) { alert("Gagal menganalisis gambar."); }
                setLoading(false);
            };

            return (
                <div className="space-y-10 animate-in fade-in">
                    <h3 className="text-4xl font-black text-white uppercase tracking-tighter flex items-center gap-4">
                        <i className="ph ph-magnifying-glass text-red-600"></i> Prompt Finder
                    </h3>
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-12">
                        <div className="glass-card p-12 rounded-[50px] flex flex-col items-center justify-center border-dashed border-2 border-white/10 hover:bg-white/5 transition-all cursor-pointer relative overflow-hidden aspect-video">
                            <i className="ph ph-upload-simple text-6xl text-gray-600 mb-8"></i>
                            <p className="text-gray-400 font-black uppercase text-xs tracking-[0.3em]">Unggah Gambar Referensi</p>
                            <input type="file" onChange={e => setFile(e.target.files[0])} className="absolute inset-0 opacity-0 cursor-pointer" />
                            {file && <p className="mt-6 text-red-500 font-black text-xs uppercase tracking-widest">{file.name}</p>}
                        </div>
                        <div className="bg-white/5 border border-white/10 p-12 rounded-[50px] min-h-[400px] flex flex-col shadow-inner">
                            <label className="text-[10px] font-black text-red-500 uppercase tracking-[0.4em] mb-8 block">Hasil Bongkar Prompt</label>
                            <div className="flex-1">
                                <p className="text-gray-300 text-sm leading-loose whitespace-pre-wrap font-mono">{res || "Menunggu data analisis..."}</p>
                            </div>
                            <button onClick={handleAnalyze} disabled={loading || !file} className="w-full btn-primary py-5 rounded-2xl font-black mt-10 tracking-widest uppercase transition-all">
                                {loading ? <i className="ph ph-spinner animate-spin text-2xl"></i> : "Bongkar Prompt Sekarang"}
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        function AlgoView() {
            const [loading, setLoading] = useState(false);
            const [res, setRes] = useState("");

            const handleGen = async () => {
                setLoading(true);
                try {
                    const data = await AI.call('generate-text', { prompt: "Buatkan naskah edukasi algoritma TikTok FYP paling update dalam format script video yang menarik bagi kreator pemula." });
                    setRes(data.text);
                } catch (e) { alert("Gagal."); }
                setLoading(false);
            };

            return (
                <div className="space-y-10 animate-in fade-in">
                    <h3 className="text-4xl font-black text-white uppercase tracking-tighter flex items-center gap-4">
                        <i className="ph ph-wand text-red-600"></i> TikTok Algo Prompt
                    </h3>
                    <div className="bg-white/5 p-12 rounded-[50px] border border-white/10 shadow-2xl">
                        <button onClick={handleGen} disabled={loading} className="btn-primary px-16 py-6 rounded-3xl font-black mb-12 shadow-lg transition-all uppercase tracking-tighter text-lg">
                            {loading ? "Analisis Algoritma..." : "Generate Naskah Edukasi FYP"}
                        </button>
                        <div className="input-dark p-10 rounded-[40px] min-h-[350px] shadow-inner">
                            <p className="whitespace-pre-wrap text-base text-gray-200 leading-relaxed font-medium">{res || "Klik tombol di atas untuk melihat rahasia algoritma viral..."}</p>
                        </div>
                    </div>
                </div>
            );
        }

        function AuthScreen() {
            const [email, setEmail] = useState("");
            const [password, setPassword] = useState("");
            const [loading, setLoading] = useState(false);

            const handleAuth = async (e) => {
                e.preventDefault();
                setLoading(true);
                const { error } = await virexaAuth.auth.signInWithPassword({ email, password });
                if (error) {
                    const { error: regErr } = await virexaAuth.auth.signUp({ email, password });
                    if (regErr) alert(regErr.message);
                    else alert("PENDAFTARAN BERHASIL! Silakan klik tombol MASUK lagi.");
                }
                setLoading(false);
            };

            return (
                <div className="h-screen flex items-center justify-center p-8 bg-black relative">
                    <div className="absolute top-[-20%] right-[-10%] w-[800px] h-[800px] bg-red-600/10 rounded-full blur-[180px]"></div>
                    <div className="bg-white/5 border border-white/10 p-16 rounded-[60px] w-full max-w-md shadow-[0_0_60px_rgba(0,0,0,0.8)] relative z-10 text-center">
                        <div className="mb-16">
                            <i className="ph-fill ph-sparkle text-8xl text-red-600 mb-8 block mx-auto drop-shadow-glow"></i>
                            <h1 className="text-4xl font-black text-white tracking-tighter uppercase mb-4">Virexa Studio</h1>
                            <p className="text-gray-500 text-[10px] uppercase tracking-[0.5em] font-black">Portal Akses Kreator</p>
                        </div>
                        <form onSubmit={handleAuth} className="space-y-6">
                            <input type="email" placeholder="Email" className="w-full bg-black/80 border border-white/10 p-6 rounded-3xl outline-none focus:border-red-600 text-sm font-bold transition-all" onChange={e => setEmail(e.target.value)} required />
                            <input type="password" placeholder="Password" className="w-full bg-black/80 border border-white/10 p-6 rounded-3xl outline-none focus:border-red-600 text-sm font-bold transition-all" onChange={e => setPassword(e.target.value)} required />
                            <button className="w-full btn-primary py-6 rounded-3xl font-black text-white text-lg mt-8 shadow-2xl uppercase tracking-widest">
                                {loading ? <i className="ph ph-spinner animate-spin"></i> : "Masuk ke Studio"}
                            </button>
                        </form>
                        <p className="text-[10px] text-gray-700 mt-16 uppercase tracking-widest font-black italic">Virexa Security Protocol v2.0 - Active</p>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
