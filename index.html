<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virexa Studio - Portal Kreator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #050000; }
        ::-webkit-scrollbar-thumb { background: #4a0404; border-radius: 10px; }
        body { background-color: #050000; color: #f3f4f6; overflow: hidden; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        // ==========================================
        // KONFIGURASI BACKEND & SUPABASE
        // ==========================================
        const BACKEND_URL = "https://virexa-backend.vercel.app"; 
        const SUPABASE_URL = 'https://pgefqhpomzjbqbqobkta.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_YO3yI5L3PSXl2X9VXhwRcQ_OID1tZdo';
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // --- API SERVICES ---
        const AI = {
            generateImage: async (prompt) => {
                const res = await fetch(`${BACKEND_URL}/api/generate-image`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt })
                });
                const data = await res.json();
                if (!data.success) throw new Error(data.error);
                return data.image;
            }
        };

        function App() {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                supabase.auth.getSession().then(({ data: { session } }) => {
                    setUser(session?.user ?? null);
                    setLoading(false);
                });
                supabase.auth.onAuthStateChange((_event, session) => {
                    setUser(session?.user ?? null);
                });
            }, []);

            if (loading) return <div className="h-screen flex items-center justify-center"><i className="ph ph-spinner animate-spin text-4xl text-red-600"></i></div>;
            if (!user) return <AuthScreen />;

            return (
                <div className="flex h-screen">
                    <aside className="w-64 border-r border-white/10 p-6 flex flex-col">
                        <h1 className="text-2xl font-black text-white mb-8">VIREXA</h1>
                        <nav className="flex-1 space-y-2">
                            <button className="w-full text-left p-3 rounded-xl bg-red-600/10 text-white border border-red-600/30">Beranda</button>
                        </nav>
                        <button onClick={() => supabase.auth.signOut()} className="text-gray-500 text-sm hover:text-white">Keluar</button>
                    </aside>
                    <main className="flex-1 p-10 overflow-y-auto">
                        <h2 className="text-3xl font-bold mb-4">Selamat Datang, {user.email.split('@')[0]}!</h2>
                        <div className="bg-white/5 p-6 rounded-2xl border border-white/10 max-w-xl">
                            <p className="text-sm text-gray-400 mb-4">Mulai buat gambar AI Anda secara aman melalui backend.</p>
                            <ImageGen />
                        </div>
                    </main>
                </div>
            );
        }

        function ImageGen() {
            const [prompt, setPrompt] = useState("");
            const [img, setImg] = useState(null);
            const [load, setLoad] = useState(false);

            const handleGen = async () => {
                setLoad(true);
                try {
                    const url = await AI.generateImage(prompt);
                    setImg(url);
                } catch (e) { alert(e.message); }
                setLoad(false);
            };

            return (
                <div className="space-y-4">
                    <textarea value={prompt} onChange={e => setPrompt(e.target.value)} className="w-full bg-black border border-white/20 rounded-xl p-4 text-white focus:outline-none focus:border-red-600" placeholder="Deskripsikan gambar..." />
                    <button onClick={handleGen} disabled={load} className="w-full bg-red-600 py-3 rounded-xl font-bold hover:bg-red-700 transition disabled:opacity-50">
                        {load ? "Merender..." : "Generate Gambar"}
                    </button>
                    {img && <img src={img} className="w-full rounded-xl mt-4" />}
                </div>
            );
        }

        function AuthScreen() {
            const [email, setEmail] = useState("");
            const [password, setPassword] = useState("");

            const handleLogin = async (e) => {
                e.preventDefault();
                const { error } = await supabase.auth.signInWithPassword({ email, password });
                if (error) {
                    const { error: signUpErr } = await supabase.auth.signUp({ email, password });
                    if (signUpErr) alert(signUpErr.message);
                }
            };

            return (
                <div className="h-screen flex items-center justify-center p-4">
                    <div className="bg-white/5 border border-white/10 p-8 rounded-3xl w-full max-w-sm">
                        <h1 className="text-2xl font-black text-center mb-6">VIREXA STUDIO</h1>
                        <form onSubmit={handleLogin} className="space-y-4">
                            <input type="email" placeholder="Email" className="w-full bg-black/50 border border-white/10 p-4 rounded-xl focus:outline-none focus:border-red-600" onChange={e => setEmail(e.target.value)} />
                            <input type="password" placeholder="Password" className="w-full bg-black/50 border border-white/10 p-4 rounded-xl focus:outline-none focus:border-red-600" onChange={e => setPassword(e.target.value)} />
                            <button className="w-full bg-red-600 py-4 rounded-xl font-bold hover:bg-red-700 transition">Masuk / Daftar</button>
                        </form>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
